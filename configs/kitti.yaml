%YAML:1.0
# KITTI Odometry default config. Most intrinsics are read from the sequence's
# own calib.txt — values here are tracking/mapping thresholds we'll start
# tuning.
dataset: kitti

frontend:
  type: orb
  num_features: 2000
  scale_factor: 1.2
  num_levels: 8
  fast_th_init: 20
  fast_th_min: 7

stereo:
  max_disparity: 128
  min_disparity: 1

tracking:
  min_inliers_pnp: 30
  keyframe_min_translation_m: 0.5
  keyframe_min_rotation_deg: 5.0
  keyframe_min_inlier_ratio: 0.75

local_mapping:
  local_ba_keyframe_window: 10
  cull_redundant_kfs: true

loop:
  enabled: true
  vocab_path: "thirdparty/vocab/ORBvoc.txt"
  min_bow_score: 0.04
  cooldown_kfs: 20
  min_bow_matches: 20
  min_correspondences: 20
  min_ransac_inliers: 20
  min_fused_matches: 30
  max_candidates_per_kf: 3
  min_sim3_inlier_ratio: 0.15
  max_sim3_rmse_m: 50.0
